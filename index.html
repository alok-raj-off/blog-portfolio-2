/* ─── RANK SYSTEM ─────────────────────────────────────────────
   Matches the Community Ranks image: Probationer → Explorer →
   Guardian → Champion → Legend
────────────────────────────────────────────────────────────── */
const RANKS = [
  { name:'Probationer', min:0,   max:149,  emoji:'🛡️',  color:'#CD7F32', glow:'rgba(205,127,50,0.35)',  bg:'linear-gradient(135deg,#3a1f00,#1a0e00)', border:'#CD7F32' },

];
function getRank(pts){ return RANKS.find(r=>pts>=r.min&&pts<=r.max)||RANKS[0]; }
function getNextRank(pts){ const i=RANKS.findIndex(r=>pts>=r.min&&pts<=r.max); return i<RANKS.length-1?RANKS[i+1]:null; }

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F8F7F4;--sf:#FFFFFF;--sf2:#F2F0EC;--sf3:#E8E5DF;
  --tx:#17160E;--tx2:#615E57;--tx3:#A09D96;
  --ac:#1A5C39;--ach:#13492D;--acl:#E4F2EB;--acm:#48A872;
  --bd:#E2DFD9;--bd2:#C8C4BC;
  --rr:#B32B2B;--rl:#FCEAEA;
  --wr:#9B6710;--wl:#FEF2D9;
  --if:#135298;--il:#E5EFF9;
  --pu:#5230C0;--pl:#EDEAFB;
  --r:10px;--rl2:16px;--rx:22px;
  --sh:0 1px 2px rgba(0,0,0,.05),0 3px 12px rgba(0,0,0,.07);
  --fn:'DM Sans',sans-serif;
}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;font-size:15px;line-height:1.6}
button,input,select,textarea{font-family:var(--fn)}button{cursor:pointer}
/* NAV */
nav{background:var(--sf);border-bottom:1px solid var(--bd);height:56px;display:flex;align-items:center;padding:0 24px;gap:3px;position:sticky;top:0;z-index:300}
.brand{font-weight:800;font-size:17px;letter-spacing:-.5px;color:var(--tx);display:flex;align-items:center;gap:5px;margin-right:12px}
.brand em{color:var(--ac);font-style:normal}
.bpill{font-size:10px;font-weight:700;background:var(--acl);color:var(--ac);padding:2px 7px;border-radius:20px}
.nk{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--tx2);background:none;border:none;transition:.1s}
.nk:hover,.nk.on{background:var(--sf2);color:var(--tx);font-weight:600}
.ml{margin-left:auto}
.av{width:32px;height:32px;border-radius:50%;background:var(--acl);border:1.5px solid var(--acm);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ac);flex-shrink:0}
.nout{padding:6px 13px;border-radius:8px;font-size:13px;font-weight:500;border:1.5px solid var(--bd2);background:var(--sf);color:var(--tx2);transition:.1s;margin-left:8px}
.nout:hover{background:var(--sf2)}
/* LAYOUT */
.main{max-width:1200px;margin:0 auto;padding:28px 22px}
.ptit{font-size:20px;font-weight:700;letter-spacing:-.4px;margin-bottom:3px}
.psub{color:var(--tx2);font-size:13px;margin-bottom:24px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl2);padding:20px 22px;box-shadow:var(--sh)}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl2);padding:15px 17px}
.sl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin-bottom:5px}
.sv{font-size:23px;font-weight:700;letter-spacing:-.5px}
.ss{font-size:11px;color:var(--tx3);margin-top:2px}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap}
.bg{background:var(--acl);color:var(--ac)}.br{background:var(--rl);color:var(--rr)}.ba{background:var(--wl);color:var(--wr)}.bb{background:var(--il);color:var(--if)}.bgr{background:var(--sf2);color:var(--tx2)}.bp{background:var(--pl);color:var(--pu)}
/* TASK CARDS */
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden;transition:.1s}
.tc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.tc.urgent::before{background:var(--rr)}.tc.medium::before{background:var(--wr)}.tc.low::before{background:var(--if)}
.tc:hover{border-color:var(--bd2);box-shadow:var(--sh)}
.tct{font-weight:600;font-size:13px;margin-bottom:4px;line-height:1.4}
.tcd{font-size:12px;color:var(--tx2);margin-bottom:9px;line-height:1.5}
.tcm{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
/* ROADMAP */
.rm{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl2);overflow:hidden;margin-bottom:12px}
.rmh{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.rmh:hover{background:var(--sf2)}
.rmht{font-weight:600;font-size:14px}
.rmb{padding:15px 20px}
.ri{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.dot{width:8px;height:8px;border-radius:50%;background:var(--bd2);margin-top:6px;flex-shrink:0}
.dot.done{background:var(--ac)}.dot.active{background:var(--ac);box-shadow:0 0 0 3px var(--acl)}.dot.upcoming{background:var(--bd2)}
.pbar{height:4px;background:var(--sf3);border-radius:2px;overflow:hidden;width:70px}
.pfill{height:100%;background:var(--ac);border-radius:2px}
/* AUTH */
.aw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.abox{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rx);padding:36px 40px;width:100%;max-width:420px;box-shadow:var(--sh)}
.alogo{font-size:20px;font-weight:800;letter-spacing:-.5px;margin-bottom:24px}
.alogo em{color:var(--ac);font-style:normal}
.atit{font-size:20px;font-weight:700;letter-spacing:-.4px;margin-bottom:5px}
.asub{font-size:13px;color:var(--tx2);margin-bottom:24px}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fi{width:100%;padding:9px 11px;border:1.5px solid var(--bd2);border-radius:var(--r);font-size:14px;color:var(--tx);background:var(--sf);outline:none;transition:.1s}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px}
.chip{padding:6px 12px;border-radius:8px;border:1.5px solid var(--bd2);font-size:13px;font-weight:500;background:var(--sf);color:var(--tx2);transition:.1s}
.chip:hover{background:var(--sf2)}.chip.on{border-color:var(--ac);background:var(--acl);color:var(--ac);font-weight:600}.chip.dash{border-style:dashed;color:var(--tx3)}
.abtn{width:100%;padding:10px;border-radius:var(--r);font-size:14px;font-weight:700;border:none;background:var(--ac);color:#fff;transition:.1s;margin-top:6px}
.abtn:hover{background:var(--ach)}.abtn:disabled{opacity:.55;cursor:not-allowed}
.asw{text-align:center;margin-top:15px;font-size:13px;color:var(--tx2)}
.asw button{background:none;border:none;color:var(--ac);font-weight:600;font-size:13px}
.ebox{background:var(--rl);color:var(--rr);padding:9px 12px;border-radius:8px;font-size:13px;margin-bottom:12px}
.fbwarn{background:#FFF8E6;border:1px solid #E8C84A;color:#7A5A00;padding:11px 14px;border-radius:var(--r);font-size:12px;margin-bottom:16px;line-height:1.7}
.fbwarn code{background:rgba(0,0,0,.06);padding:1px 5px;border-radius:4px;font-size:11px}
/* ADMIN */
.adw{display:flex;min-height:calc(100vh - 56px)}
.ads{width:210px;background:#0D0F16;border-right:1px solid #1A1D25;padding:14px 10px;flex-shrink:0}
.adm{flex:1;padding:28px 26px;overflow-y:auto}
.si{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:8px;font-size:13px;font-weight:500;color:#767676;background:none;border:none;width:100%;text-align:left;transition:.1s;margin-bottom:2px}
.si:hover{background:#181B23;color:#C8C8C8}.si.on{background:#1A5C39;color:#48A872;font-weight:700}
.sico{font-size:14px;width:16px;text-align:center}
.ads-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#383B45;padding:14px 12px 6px}
/* FORM */
.fta{width:100%;padding:9px 11px;border:1.5px solid var(--bd2);border-radius:var(--r);font-size:14px;color:var(--tx);background:var(--sf);outline:none;resize:vertical;min-height:72px;transition:.1s;font-family:var(--fn)}
.fta:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}
.fgr{display:grid;gap:11px;margin-bottom:13px}
.bs{padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;border:none;transition:.1s}
.bacc{background:var(--ac);color:#fff}.bacc:hover{background:var(--ach)}.bacc:disabled{opacity:.55;cursor:not-allowed}
.bgh{background:var(--sf2);color:var(--tx2);border:1px solid var(--bd)}.bgh:hover{background:var(--sf3);color:var(--tx)}
.bdg{background:var(--rl);color:var(--rr)}.bdg:hover{background:#F8D2D2}
/* LIST */
.li{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px}
.lit{font-size:14px;font-weight:600}.lis{font-size:12px;color:var(--tx3);margin-top:1px}
.la{display:flex;gap:6px;flex-shrink:0;margin-left:auto;align-items:center}
/* HERO */
.hero{background:linear-gradient(125deg,var(--acl) 0%,var(--bg) 100%);border:1px solid var(--bd);border-radius:var(--rx);padding:26px 28px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:rgba(72,168,114,.1)}
.htag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--ac);margin-bottom:5px}
.hh{font-size:21px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.hs{color:var(--tx2);font-size:13px}
/* MISC */
.empty{text-align:center;padding:38px;color:var(--tx3);font-size:13px}
.spin{display:flex;align-items:center;justify-content:center;height:100vh;font-size:14px;color:var(--tx3)}
.notif{position:fixed;bottom:22px;right:22px;background:var(--tx);color:#fff;padding:11px 16px;border-radius:var(--r);font-size:13px;box-shadow:var(--sh);z-index:9999;animation:nsl .25s ease}
@keyframes nsl{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.divl{height:1px;background:var(--bd);margin:16px 0}
.slbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin-bottom:12px}

/* ── STATUS SELECTOR (roadmap items) ── */
.status-sel{display:inline-flex;border:1.5px solid var(--bd2);border-radius:7px;overflow:hidden;font-size:11px;font-weight:600;flex-shrink:0}
.status-sel button{padding:3px 8px;border:none;background:var(--sf2);color:var(--tx3);transition:.1s;white-space:nowrap}
.status-sel button:not(:last-child){border-right:1px solid var(--bd2)}
.status-sel button.act-ns{background:#E8E5DF;color:var(--tx2)}
.status-sel button.act-ip{background:var(--wl);color:var(--wr)}
.status-sel button.act-dn{background:var(--acl);color:var(--ac)}

/* ── POINTS BADGE ── */
.pts-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#FFF3CD,#FFE082);border:1.5px solid #F0C040;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700;color:#7A5800}
.pts-badge .pts-ico{font-size:15px}
.pts-stat{background:linear-gradient(135deg,#FFFBEA,#FFF3CD);border:1.5px solid #F0C040;border-radius:var(--rl2);padding:15px 17px}
.pts-stat .sv{color:#9B6710}

/* ── MODAL OVERLAY ── */
.modal-bg{position:fixed;inset:0;background:rgba(23,22,14,.45);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px;animation:fdin .15s ease}
@keyframes fdin{from{opacity:0}to{opacity:1}}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rx);padding:28px 30px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:mup .2s ease}
@keyframes mup{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-tit{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--tx2);margin-bottom:20px}
.modal-fld{margin-bottom:12px}
.modal-fld label{display:block;font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.ai-toggle{display:flex;align-items:center;gap:10px;padding:10px 13px;border:1.5px solid var(--bd2);border-radius:var(--r);cursor:pointer;transition:.1s;user-select:none}
.ai-toggle:hover{border-color:var(--ac);background:var(--acl)}
.ai-toggle.on{border-color:var(--ac);background:var(--acl)}
.ai-toggle input{accent-color:var(--ac);width:16px;height:16px}
.ai-toggle-lbl{font-size:13px;font-weight:500;flex:1}
.ai-toggle-lbl small{display:block;font-size:11px;color:var(--tx3);font-weight:400}

/* ── SUBMISSION BADGE ── */
.sub-done{display:inline-flex;align-items:center;gap:4px;background:var(--acl);color:var(--ac);border:1px solid var(--acm);border-radius:5px;font-size:11px;font-weight:600;padding:2px 7px}

/* ── ADMIN POINTS PANEL ── */
.pts-row{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px}
.pts-row .pts-val{font-size:18px;font-weight:700;color:#9B6710;min-width:40px;text-align:right}
.pts-inp{width:70px;padding:5px 8px;border:1.5px solid var(--bd2);border-radius:7px;font-size:13px;font-weight:600;text-align:center;outline:none}
.pts-inp:focus{border-color:var(--ac)}

/* ── SUBMISSIONS VIEW (admin) ── */
.sub-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.sub-card a{color:var(--ac);font-size:12px;font-weight:600;text-decoration:none}
.sub-card a:hover{text-decoration:underline}

/* ── ASSIGNMENT CARDS ── */
.ac-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.asgn-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px;position:relative;overflow:hidden;transition:.1s}
.asgn-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.asgn-card.sheet::before{background:#7C3AED}.asgn-card.resource::before{background:#0369A1}.asgn-card.research::before{background:#B45309}
.asgn-card:hover{border-color:var(--bd2);box-shadow:var(--sh)}
.asgn-type-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;margin-bottom:8px}
.asgn-type-pill.sheet{background:#EDE9FE;color:#5B21B6}
.asgn-type-pill.resource{background:#E0F2FE;color:#0369A1}
.asgn-type-pill.research{background:#FEF3C7;color:#92400E}
.asgn-title{font-weight:700;font-size:14px;margin-bottom:5px;line-height:1.35}
.asgn-desc{font-size:12px;color:var(--tx2);margin-bottom:10px;line-height:1.5}
.asgn-resource-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--if);text-decoration:none;background:var(--il);padding:3px 8px;border-radius:5px;margin-bottom:10px}
.asgn-resource-link:hover{text-decoration:underline}
.asgn-done-badge{display:inline-flex;align-items:center;gap:4px;background:var(--acl);color:var(--ac);border:1px solid var(--acm);border-radius:5px;font-size:11px;font-weight:600;padding:3px 8px}


/* ── TASK IMAGE ── */
.tc-img{width:100%;height:140px;object-fit:cover;border-radius:6px;margin-bottom:10px;display:block}
.task-img-preview{width:100%;max-height:180px;object-fit:cover;border-radius:8px;margin-top:8px;border:1.5px solid var(--bd2)}

/* ── RANK BADGE (nav) ── */
.rank-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid;transition:.2s}

/* ── RANK PAGE ── */
.rank-page{padding:28px 22px;max-width:1060px;margin:0 auto}
.rank-track{display:flex;align-items:center;gap:0;margin:28px 0;overflow-x:auto;padding:10px 4px}
.rank-card{display:flex;flex-direction:column;align-items:center;padding:22px 18px 16px;border-radius:16px;border:2px solid;min-width:140px;flex:1;position:relative;transition:.3s;cursor:default}
.rank-card.current{transform:scale(1.08);z-index:2}
.rank-card .rank-emoji{font-size:36px;margin-bottom:10px;filter:drop-shadow(0 0 8px currentColor)}
.rank-card .rank-name{font-weight:800;font-size:14px;letter-spacing:.5px;margin-bottom:4px}
.rank-card .rank-pts{font-size:11px;opacity:.75;font-weight:500}
/* ── LEADERBOARD ── */
@keyframes shimmer-gold{0%,100%{box-shadow:0 0 18px 4px rgba(72,201,138,.55),0 4px 32px rgba(72,201,138,.25)}50%{box-shadow:0 0 32px 8px rgba(72,201,138,.85),0 8px 48px rgba(72,201,138,.4)}}

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ─ helpers ─ */
const DOMAINS=['AI/ML','Web Dev','DSA','Cloud & DevOps','Data Science','Cybersecurity','Mobile Dev','General'];

function ini(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function Av({name,size=32}){
  return<div className="av" style={{width:size,height:size,fontSize:size>34?14:11}}>{ini(name)}</div>;
}
function Notif({msg}){return msg?<div className="notif">{msg}</div>:null}
function useNotif(){
  const[n,sn]=useState(null);
  const show=m=>{sn(m);setTimeout(()=>sn(null),3000)};
  return[n,show];
}
function PBadge({p}){
  if(p==='urgent')return<span className="badge br">● Urgent</span>;
  if(p==='medium')return<span className="badge ba">● Medium</span>;
  return<span className="badge bb">● Low</span>;
}
function Spin(){return<div className="spin">Loading EduTrack…</div>}
function isConfigured(){
  try{return !firebase.apps[0].options.apiKey.startsWith('PASTE')}catch{return false}
}

/* ═══════════════════════════════════════════════
   STUDENT AUTH
═══════════════════════════════════════════════ */
function StudentAuth({onAuth,onAdmin}){
  const[mode,setMode]=useState('login');
  const[email,setEmail]=useState('');
  const[pw,setPw]=useState('');
  const[name,setName]=useState('');
  const[flds,setFlds]=useState([]);
  const[extra,setExtra]=useState([]);
  const[addF,setAddF]=useState(false);
  const[newF,setNewF]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const cfg=isConfigured();

  const allF=[...DOMAINS,...extra];
  const togF=f=>setFlds(p=>p.includes(f)?p.filter(x=>x!==f):[...p,f]);
  const saveF=()=>{if(!newF.trim())return;setExtra(p=>[...p,newF.trim()]);setFlds(p=>[...p,newF.trim()]);setNewF('');setAddF(false)};

  const go=async()=>{
    setErr('');setBusy(true);
    try{
      if(mode==='signup'){
        const r=await auth.createUserWithEmailAndPassword(email,pw);
        await r.user.updateProfile({displayName:name});
        await db.collection('users').doc(r.user.uid).set({
          name,email,fields:flds,role:'student',points:0,
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
        onAuth({uid:r.user.uid,displayName:name,email,fields:flds});
      }else{
        const r=await auth.signInWithEmailAndPassword(email,pw);
        const snap=await db.collection('users').doc(r.user.uid).get();
        const d=snap.data()||{};
        onAuth({uid:r.user.uid,displayName:r.user.displayName||d.name||email,email,fields:d.fields||[]});
      }
    }catch(e){setErr(e.message)}
    finally{setBusy(false)}
  };

  return(
    <div className="aw">
      <div className="abox">
        <div className="alogo">Edu<em>Track</em></div>
        {!cfg&&<div className="fbwarn">
          ⚠️ <strong>Firebase not connected yet.</strong><br/>
          Open this file, find <code>firebaseConfig</code> near the top, and replace each <code>PASTE_…_HERE</code> value with your real Firebase project credentials.<br/>
          Get them at <strong>console.firebase.google.com</strong> → Project Settings → Your apps → Web.<br/>
          Also enable <strong>Email/Password Authentication</strong> and <strong>Firestore Database</strong> in your project.
        </div>}
        <div className="atit">{mode==='login'?'Welcome back':'Create account'}</div>
        <div className="asub">{mode==='login'?'Sign in to your student dashboard':'Join your cohort and start learning'}</div>
        {mode==='signup'&&<div className="fld"><label>Full name</label>
          <input className="fi" placeholder="Your name" value={name} onChange={e=>setName(e.target.value)}/>
        </div>}
        <div className="fld"><label>Email</label>
          <input className="fi" type="email" placeholder="you@example.com" value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>
        <div className="fld"><label>Password</label>
          <input className="fi" type="password" placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/>
        </div>
        {mode==='signup'&&<div className="fld">
          <label>Your learning fields</label>
          <div className="chips">
            {allF.map(f=><button key={f} className={`chip${flds.includes(f)?' on':''}`} onClick={()=>togF(f)}>{f}</button>)}
            {addF?(
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <input value={newF} onChange={e=>setNewF(e.target.value)} placeholder="Field name"
                  style={{padding:'5px 9px',border:'1.5px solid var(--bd2)',borderRadius:8,fontSize:13,width:120,outline:'none',fontFamily:'var(--fn)'}}
                  onKeyDown={e=>e.key==='Enter'&&saveF()}/>
                <button className="bs bacc" onClick={saveF}>Add</button>
                <button className="bs bgh" onClick={()=>setAddF(false)}>✕</button>
              </div>
            ):(
              <button className="chip dash" onClick={()=>setAddF(true)}>+ Add field</button>
            )}
          </div>
        </div>}
        {err&&<div className="ebox">{err}</div>}
        <button className="abtn" onClick={go} disabled={busy||!email||!pw}>
          {busy?'Please wait…':mode==='login'?'Sign in':'Create account'}
        </button>
        <div className="asw">
          {mode==='login'
            ?<>No account? <button onClick={()=>setMode('signup')}>Sign up free</button></>
            :<>Already a member? <button onClick={()=>setMode('login')}>Sign in</button></>}
        </div>
        <div className="divl"/>
        <div style={{textAlign:'center'}}>
          <button className="bs bgh" onClick={onAdmin} style={{fontSize:12,padding:'5px 12px'}}>🔐 Admin login</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ADMIN LOGIN
═══════════════════════════════════════════════ */
function AdminLogin({onSuccess,onBack}){
  const[u,setU]=useState('');
  const[p,setP]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);

  const go=async()=>{
    setErr('');
    if(u!==ADMIN_USER){setErr('Invalid admin username.');return}
    if(p!==ADMIN_PASS){setErr('Invalid admin password.');return}
    setBusy(true);
    try{
      try{
        await auth.signInWithEmailAndPassword(ADMIN_EMAIL,ADMIN_PASS);
      }catch(e){
        if(e.code==='auth/user-not-found'||e.code==='auth/invalid-credential'){
          await auth.createUserWithEmailAndPassword(ADMIN_EMAIL,ADMIN_PASS);
        }else if(e.code!=='auth/wrong-password'){}
      }
      onSuccess();
    }catch(e){setErr(e.message)}
    finally{setBusy(false)}
  };

  return(
    <div className="aw">
      <div className="abox">
        <div className="alogo">Edu<em>Track</em> <span className="bpill">Admin</span></div>
        <div className="atit">Admin access</div>
        <div className="asub">Restricted — authorised personnel only</div>
        <div className="fld"><label>Username</label>
          <input className="fi" placeholder="hceadmin" value={u} onChange={e=>setU(e.target.value)}/>
        </div>
        <div className="fld"><label>Password</label>
          <input className="fi" type="password" placeholder="••••••••" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/>
        </div>
        {err&&<div className="ebox">{err}</div>}
        <button className="abtn" onClick={go} disabled={busy||!u||!p}>
          {busy?'Signing in…':'Access admin panel'}
        </button>
        <div className="asw"><button onClick={onBack}>← Back to student login</button></div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ASSIGNMENT SUBMIT MODAL
═══════════════════════════════════════════════ */
const WHAT_DONE_OPTIONS=[
  'Read / studied the material',
  'Solved the sheet / problems',
  'Completed the research',
  'Watched the resources',
  'Took notes & summarised',
  'Practised the concepts',
  'Discussed with peers',
  'Other',
];

function AssignmentSubmitModal({assignment,uid,onClose,onSuccess}){
  const[whatDone,setWhatDone]=useState('');
  const[desc,setDesc]=useState('');
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState('');

  const typeInfo={sheet:{emoji:'📄',label:'Sheet'},resource:{emoji:'📚',label:'Resource'},research:{emoji:'🔬',label:'Research'}};
  const info=typeInfo[assignment.type]||{emoji:'📝',label:'Assignment'};

  const submit=async()=>{
    if(!whatDone){setErr('Please select what you did.');return}
    if(!desc.trim()){setErr('Please describe your work.');return}
    setBusy(true);setErr('');
    try{
      await db.collection('assignmentSubmissions').doc(`${uid}_${assignment.id}`).set({
        uid,assignmentId:assignment.id,assignmentTitle:assignment.title,
        assignmentType:assignment.type,whatDone,description:desc.trim(),
        submittedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      onSuccess();
    }catch(e){setErr(e.message)}
    finally{setBusy(false)}
  };

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:540}}>
        {/* header */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
          <span style={{fontSize:24}}>{info.emoji}</span>
          <div>
            <div className="modal-tit" style={{marginBottom:0}}>Submit Assignment</div>
            <div style={{fontSize:12,color:'var(--tx3)',marginTop:2}}>{info.label} · {assignment.domain}</div>
          </div>
        </div>
        <div style={{fontWeight:600,fontSize:15,marginBottom:18,color:'var(--tx)'}}>{assignment.title}</div>

        {/* what did you do */}
        <div className="modal-fld">
          <label>What did you do? *</label>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {WHAT_DONE_OPTIONS.map(opt=>(
              <div key={opt} onClick={()=>setWhatDone(opt)}
                style={{display:'flex',alignItems:'center',gap:9,padding:'9px 12px',borderRadius:8,
                  border:`1.5px solid ${whatDone===opt?'var(--ac)':'var(--bd2)'}`,
                  background:whatDone===opt?'var(--acl)':'var(--sf)',cursor:'pointer',transition:'.1s',userSelect:'none'}}>
                <div style={{width:16,height:16,borderRadius:'50%',border:`2px solid ${whatDone===opt?'var(--ac)':'var(--bd2)'}`,
                  background:whatDone===opt?'var(--ac)':'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {whatDone===opt&&<div style={{width:6,height:6,borderRadius:'50%',background:'#fff'}}/>}
                </div>
                <span style={{fontSize:13,fontWeight:whatDone===opt?600:400,color:whatDone===opt?'var(--ac)':'var(--tx)'}}>{opt}</span>
              </div>
            ))}
          </div>
        </div>

        {/* describe your work */}
        <div className="modal-fld" style={{marginTop:14}}>
          <label>Describe your work *</label>
          <textarea className="fta" style={{minHeight:90}}
            placeholder="What exactly did you do? What did you learn or understand? Any challenges you faced?"
            value={desc} onChange={e=>setDesc(e.target.value)}/>
        </div>

        {/* file note */}
        <div style={{background:'#FEF3C7',border:'1px solid #F0C040',borderRadius:8,padding:'10px 14px',marginBottom:14,display:'flex',gap:10,alignItems:'flex-start'}}>
          <span style={{fontSize:16,flexShrink:0,marginTop:1}}>📌</span>
          <div style={{fontSize:12,color:'#78350F',lineHeight:1.6}}>
            <strong>Have a file to share?</strong> Upload it in the <strong>Community</strong> section — not here. This form is just for your written reflection.
          </div>
        </div>

        {err&&<div className="ebox">{err}</div>}
        <div style={{display:'flex',gap:8}}>
          <button className="bs bacc" onClick={submit} disabled={busy||!whatDone||!desc.trim()}>{busy?'Submitting…':'Submit'}</button>
          <button className="bs bgh" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   STUDENT ASSIGNMENTS TAB
═══════════════════════════════════════════════ */
function SAssignments({assignments,submittedIds,onSubmit}){
  const[filter,setFilter]=useState('all');
  const typeInfo={sheet:{emoji:'📄',label:'Sheet'},resource:{emoji:'📚',label:'Resource'},research:{emoji:'🔬',label:'Research'}};

  const types=['all','sheet','resource','research'];
  const shown=filter==='all'?assignments:assignments.filter(a=>a.type===filter);
  const pending=assignments.filter(a=>!submittedIds.has(a.id)).length;

  return(<>
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:4,flexWrap:'wrap',gap:8}}>
      <div>
        <div className="ptit">📝 Assignments</div>
        <div className="psub">{pending>0?`${pending} pending · `:'All caught up · '}{assignments.length} total assignment{assignments.length!==1?'s':''}</div>
      </div>
    </div>

    {/* type filter */}
    <div style={{display:'flex',gap:7,marginBottom:18,flexWrap:'wrap'}}>
      {types.map(t=>(
        <button key={t} className={`bs ${filter===t?'bacc':'bgh'}`} onClick={()=>setFilter(t)}>
          {t==='all'?'All':`${typeInfo[t]?.emoji||'📝'} ${typeInfo[t]?.label||t}`}
        </button>
      ))}
    </div>

    {shown.length===0&&<div className="empty">{assignments.length===0?'No assignments yet — check back soon!':'No assignments of this type.'}</div>}

    <div className="ac-wrap">
      {shown.map(a=>{
        const done=submittedIds.has(a.id);
        const info=typeInfo[a.type]||{emoji:'📝',label:'Assignment'};
        return(
          <div key={a.id} className={`asgn-card ${a.type||'sheet'}`}>
            <div className={`asgn-type-pill ${a.type||'sheet'}`}>{info.emoji} {info.label}</div>
            <div className="asgn-title">{a.title}</div>
            {a.description&&<div className="asgn-desc">{a.description}</div>}
            {a.resourceUrl&&(
              <a href={a.resourceUrl} target="_blank" rel="noreferrer" className="asgn-resource-link">
                🔗 Open resource ↗
              </a>
            )}
            <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap',marginTop:4}}>
              <span className="badge bp">{a.domain}</span>
              {a.dueDate&&<span className="badge bgr">📅 {a.dueDate}</span>}
              {done
                ?<span className="asgn-done-badge">✅ Submitted</span>
                :<button className="bs bacc" style={{fontSize:12,padding:'4px 11px',marginLeft:'auto'}} onClick={()=>onSubmit(a)}>Submit</button>
              }
            </div>
          </div>
        );
      })}
    </div>
  </>);
}

/* ═══════════════════════════════════════════════
   SUBMIT ASSIGNMENT MODAL (tasks)
═══════════════════════════════════════════════ */
function SubmitModal({task,uid,onClose,onSuccess}){
  const[github,setGithub]=useState('');
  const[preview,setPreview]=useState('');
  const[desc,setDesc]=useState('');
  const[usedAI,setUsedAI]=useState(false);
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState('');

  const submit=async()=>{
    if(!github.trim()){setErr('GitHub URL is required.');return}
    setBusy(true);setErr('');
    try{
      const pts=TASK_POINTS[task.title]??DEFAULT_TASK_POINTS;
      const subRef=db.collection('submissions').doc(`${uid}_${task.id}`);
      await subRef.set({
        uid,taskId:task.id,taskTitle:task.title,
        githubUrl:github.trim(),previewUrl:preview.trim(),
        description:desc.trim(),usedAI,points:pts,
        submittedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      // add points to user
      await db.collection('users').doc(uid).update({
        points:firebase.firestore.FieldValue.increment(pts)
      });
      onSuccess(pts);
    }catch(e){setErr(e.message)}
    finally{setBusy(false)}
  };

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-tit">Submit Assignment</div>
        <div className="modal-sub">
          <span className="badge bp" style={{marginRight:6}}>{task.domain}</span>
          {task.title}
        </div>

        <div className="modal-fld">
          <label>GitHub Repository URL *</label>
          <input className="fi" placeholder="https://github.com/yourusername/repo" value={github} onChange={e=>setGithub(e.target.value)}/>
        </div>
        <div className="modal-fld">
          <label>Preview / Live URL <span style={{fontWeight:400,color:'var(--tx3)',textTransform:'none',fontSize:11}}>(optional)</span></label>
          <input className="fi" placeholder="https://yourproject.vercel.app" value={preview} onChange={e=>setPreview(e.target.value)}/>
        </div>
        <div className="modal-fld">
          <label>Description <span style={{fontWeight:400,color:'var(--tx3)',textTransform:'none',fontSize:11}}>(what did you build / learn?)</span></label>
          <textarea className="fta" placeholder="Briefly describe your submission…" value={desc} onChange={e=>setDesc(e.target.value)} style={{minHeight:80}}/>
        </div>
        <div className="modal-fld">
          <label>AI Usage</label>
          <div className={`ai-toggle${usedAI?' on':''}`} onClick={()=>setUsedAI(p=>!p)}>
            <input type="checkbox" checked={usedAI} onChange={()=>{}} onClick={e=>e.stopPropagation()}/>
            <div className="ai-toggle-lbl">
              I used AI assistance (ChatGPT, Claude, Copilot, etc.)
              <small>Being honest helps your admin understand your learning better</small>
            </div>
          </div>
        </div>

        <div style={{background:'var(--acl)',border:'1px solid var(--acm)',borderRadius:8,padding:'9px 13px',marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:18}}>🏆</span>
          <div style={{fontSize:13}}>
            <strong style={{color:'var(--ac)'}}>{TASK_POINTS[task.title]??DEFAULT_TASK_POINTS} points</strong>
            <span style={{color:'var(--tx2)'}}> will be added to your score on submission</span>
          </div>
        </div>

        {err&&<div className="ebox">{err}</div>}
        <div style={{display:'flex',gap:8}}>
          <button className="bs bacc" onClick={submit} disabled={busy||!github.trim()}>{busy?'Submitting…':'Submit Assignment'}</button>
          <button className="bs bgh" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   STUDENT DASHBOARD
═══════════════════════════════════════════════ */
function StudentDash({user,onSignOut}){
  const[tab,setTab]=useState('home');
  const[tasks,setTasks]=useState([]);
  const[assignments,setAssignments]=useState([]);
  const[roadmaps,setRoadmaps]=useState([]);
  const[submissions,setSubmissions]=useState([]);
  const[asnSubmissions,setAsnSubmissions]=useState([]);
  const[userData,setUserData]=useState({points:0});
  const[allStudents,setAllStudents]=useState([]);
  const[loading,setLoading]=useState(true);
  const[submitTask,setSubmitTask]=useState(null);
  const[submitAsn,setSubmitAsn]=useState(null);
  const[notif,showNotif]=useNotif();

  useEffect(()=>{
    const u1=db.collection('tasks').orderBy('createdAt','desc').onSnapshot(s=>{
      setTasks(s.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);
    },()=>setLoading(false));
    const u2=db.collection('roadmaps').orderBy('createdAt','desc').onSnapshot(s=>{
      setRoadmaps(s.docs.map(d=>({id:d.id,...d.data()})));
    });
    const u3=db.collection('submissions').where('uid','==',user.uid).onSnapshot(s=>{
      setSubmissions(s.docs.map(d=>({id:d.id,...d.data()})));
    });
    const u4=db.collection('users').doc(user.uid).onSnapshot(s=>{
      if(s.exists)setUserData(s.data());
    });
    const u5=db.collection('users').onSnapshot(s=>{
      setAllStudents(s.docs.map(d=>({id:d.id,...d.data()})).filter(d=>d.role==='student'||(!d.role&&d.email)));
    },()=>{});
    const u6=db.collection('assignments').orderBy('createdAt','desc').onSnapshot(s=>{
      setAssignments(s.docs.map(d=>({id:d.id,...d.data()})));
    },()=>{});
    const u7=db.collection('assignmentSubmissions').where('uid','==',user.uid).onSnapshot(s=>{
      setAsnSubmissions(s.docs.map(d=>({id:d.id,...d.data()})));
    },()=>{});
    return()=>{u1();u2();u3();u4();u5();u6();u7()};
  },[user.uid]);

  const myF=userData.fields||user.fields||[];
  const myT=tasks.filter(t=>{
    if(t.assignedUids&&t.assignedUids.length>0) return t.assignedUids.includes(user.uid);
    return myF.length?myF.includes(t.domain)||t.domain==='General':true;
  });
  const myA=assignments.filter(a=>{
    if(a.assignedUids&&a.assignedUids.length>0) return a.assignedUids.includes(user.uid);
    return myF.length?myF.includes(a.domain)||a.domain==='General':true;
  });
  const myR=myF.length?roadmaps.filter(r=>myF.includes(r.domain)):roadmaps;
  const submittedIds=new Set(submissions.map(s=>s.taskId));
  const submittedAsnIds=new Set(asnSubmissions.map(s=>s.assignmentId));
  const hr=new Date().getHours();
  const greet=hr<12?'Good morning':hr<18?'Good afternoon':'Good evening';
  const totalPts=userData.points||0;

  const handleSubmitSuccess=pts=>{setSubmitTask(null);showNotif(`🏆 Submitted! +${pts} points earned`)};
  const handleAsnSubmitSuccess=()=>{setSubmitAsn(null);showNotif('✅ Assignment submitted!')};

  return(<>
    <nav>
      <div className="brand">Edu<em>Track</em></div>
      <button className={`nk${tab==='home'?' on':''}`} onClick={()=>setTab('home')}>Home</button>
      <button className={`nk${tab==='tasks'?' on':''}`} onClick={()=>setTab('tasks')}>Tasks</button>
      <button className={`nk${tab==='assignments'?' on':''}`} onClick={()=>setTab('assignments')}>
        📝 Assignments {myA.filter(a=>!submittedAsnIds.has(a.id)).length>0&&<span style={{background:'var(--rr)',color:'#fff',borderRadius:10,fontSize:10,fontWeight:800,padding:'1px 5px',marginLeft:3}}>{myA.filter(a=>!submittedAsnIds.has(a.id)).length}</span>}
      </button>
      <button className={`nk${tab==='roadmap'?' on':''}`} onClick={()=>setTab('roadmap')}>Roadmap</button>
      <button className={`nk${tab==='rank'?' on':''}`} onClick={()=>setTab('rank')}>🏅 Rank</button>
      <div className="ml"/>
      {(()=>{const rank=getRank(totalPts);return<span className="rank-pill" style={{color:rank.color,borderColor:rank.color,background:'rgba(0,0,0,0.04)'}}>{rank.emoji} {rank.name}</span>})()}
      <div className="pts-badge"><span className="pts-ico">🏆</span>{totalPts} pts</div>
      <Av name={user.displayName}/>
      <button className="nout" onClick={onSignOut}>Sign out</button>
    </nav>
    <div className="main">
      {loading?<div className="empty">Loading…</div>:<>
        {tab==='home'&&<SHome user={user} tasks={myT} roadmaps={myR} greet={greet} points={totalPts} submittedIds={submittedIds} onSubmit={setSubmitTask} allStudents={allStudents}/>}
        {tab==='tasks'&&<STasks tasks={myT} submittedIds={submittedIds} onSubmit={setSubmitTask}/>}
        {tab==='assignments'&&<SAssignments assignments={myA} submittedIds={submittedAsnIds} onSubmit={setSubmitAsn}/>}
        {tab==='roadmap'&&<SRoadmap roadmaps={myR} uid={user.uid}/>}
        {tab==='rank'&&<SRank points={totalPts}/>}
      </>}
    </div>
    {submitTask&&<SubmitModal task={submitTask} uid={user.uid} onClose={()=>setSubmitTask(null)} onSuccess={handleSubmitSuccess}/>}
    {submitAsn&&<AssignmentSubmitModal assignment={submitAsn} uid={user.uid} onClose={()=>setSubmitAsn(null)} onSuccess={handleAsnSubmitSuccess}/>}
    <Notif msg={notif}/>
  </>);
}

/* ── RANK PAGE (student) ── */
function SRank({points}){
  const currentRank=getRank(points);
  const nextRank=getNextRank(points);
  const currentIdx=RANKS.indexOf(currentRank);

  // progress to next rank
  const pct=nextRank
    ?Math.round(((points-currentRank.min)/(nextRank.min-currentRank.min))*100)
    :100;

  return(
    <div>
      {/* Hero banner */}
      <div style={{background:currentRank.bg,border:`2px solid ${currentRank.border}`,borderRadius:20,padding:'30px 28px',marginBottom:24,boxShadow:`0 0 40px ${currentRank.glow}`,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-30,right:-30,fontSize:120,opacity:.08,pointerEvents:'none',userSelect:'none'}}>{currentRank.emoji}</div>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:currentRank.color,marginBottom:8}}>Your Current Rank</div>
        <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:12}}>
          <span style={{fontSize:52,filter:`drop-shadow(0 0 14px ${currentRank.color})`}}>{currentRank.emoji}</span>
          <div>
            <div style={{fontSize:28,fontWeight:900,color:currentRank.color,letterSpacing:-.5}}>{currentRank.name}</div>
            <div style={{fontSize:14,color:'rgba(255,255,255,.55)',marginTop:2}}>🏆 {points} points earned</div>
          </div>
        </div>
        {nextRank?(
          <div style={{background:'rgba(255,255,255,.06)',borderRadius:10,padding:'12px 14px'}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'rgba(255,255,255,.6)',marginBottom:6}}>
              <span>{currentRank.name} ({currentRank.min} pts)</span>
              <span>{nextRank.name} ({nextRank.min} pts)</span>
            </div>
            <div className="progress-bar-wrap" style={{background:'rgba(255,255,255,.12)'}}>
              <div className="progress-bar-fill" style={{width:pct+'%',background:currentRank.color}}/>
            </div>
            <div style={{fontSize:12,color:'rgba(255,255,255,.5)',marginTop:4}}>
              {nextRank.min-points} more pts to reach <strong style={{color:nextRank.color}}>{nextRank.emoji} {nextRank.name}</strong>
            </div>
          </div>
        ):(
          <div style={{background:'rgba(255,255,255,.08)',borderRadius:10,padding:'10px 14px',fontSize:13,color:'rgba(255,255,255,.7)'}}>
            🎉 You've reached the <strong style={{color:currentRank.color}}>highest rank</strong>! Legendary status achieved.
          </div>
        )}
      </div>

      {/* Rank track */}
      <div className="ptit" style={{marginBottom:4}}>Community Ranks</div>
      <div className="psub" style={{marginBottom:16}}>Earn points by submitting tasks to climb the leaderboard</div>

      <div className="rank-track">
        {RANKS.map((r,i)=>{
          const isPast=points>=r.min;
          const isCurrent=r===currentRank;
          return(
            <React.Fragment key={r.name}>
              {i>0&&<div className={`rank-connector${points>=r.min?' passed':''}`}/>}
              <div className={`rank-card${isCurrent?' current':''}`} style={{
                background: isCurrent?r.bg:'var(--sf)',
                borderColor: isPast?r.color:'var(--bd2)',
                boxShadow: isCurrent?`0 0 24px ${r.glow}`:isPast?`0 0 8px ${r.glow}`:'none',
                opacity: isPast?1:.5,
              }}>
                {isCurrent&&<div style={{position:'absolute',top:8,right:8,background:r.color,color:'#fff',fontSize:9,fontWeight:800,padding:'2px 6px',borderRadius:8,letterSpacing:.5}}>YOU</div>}
                <div className="rank-emoji">{r.emoji}</div>
                <div className="rank-name" style={{color: isPast?r.color:'var(--tx2)'}}>{r.name}</div>
                <div className="rank-pts" style={{color: isPast?r.color:'var(--tx3)'}}>{r.min===0?'0':r.min}+ pts</div>
              </div>
            </React.Fragment>
          );
        })}
      </div>

      {/* Rank table */}
      <div className="card" style={{marginTop:20}}>
        <div className="slbl" style={{marginBottom:14}}>All Ranks & Requirements</div>
        {RANKS.map((r,i)=>{
          const isPast=points>=r.min;
          const isCurrent=r===currentRank;
          return(
            <div key={r.name} style={{display:'flex',alignItems:'center',gap:14,padding:'12px 0',borderBottom:i<RANKS.length-1?'1px solid var(--bd)':'none',opacity:isPast?1:.5}}>
              <span style={{fontSize:24,width:32,textAlign:'center'}}>{r.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:isPast?r.color:'var(--tx)',display:'flex',alignItems:'center',gap:7}}>
                  {r.name}
                  {isCurrent&&<span style={{background:r.color,color:'#fff',fontSize:9,fontWeight:800,padding:'1px 6px',borderRadius:8}}>CURRENT</span>}
                  {isPast&&!isCurrent&&<span style={{fontSize:11,color:r.color}}>✓ Achieved</span>}
                </div>
                <div style={{fontSize:12,color:'var(--tx3)',marginTop:2}}>
                  {r.max===Infinity?`${r.min}+ points`:`${r.min} – ${r.max} points`}
                </div>
              </div>
              {isCurrent&&nextRank&&(
                <div style={{fontSize:12,color:'var(--tx3)',textAlign:'right'}}>
                  <div style={{fontWeight:600,color:r.color}}>{pct}%</div>
                  <div>to next</div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── Task card (student, with submit button) ── */
function ImageLightbox({src,alt,onClose}){
  useEffect(()=>{
    const onKey=e=>{if(e.key==='Escape')onClose()};
    document.addEventListener('keydown',onKey);
    return()=>document.removeEventListener('keydown',onKey);
  },[]);
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.88)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:20,animation:'fdin .15s ease',cursor:'zoom-out'}}>
      <button onClick={onClose} style={{position:'absolute',top:18,right:22,background:'rgba(255,255,255,.12)',border:'none',color:'#fff',fontSize:22,width:40,height:40,borderRadius:'50%',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1,transition:'.15s'}}
        onMouseEnter={e=>e.target.style.background='rgba(255,255,255,.25)'}
        onMouseLeave={e=>e.target.style.background='rgba(255,255,255,.12)'}>✕</button>
      <img
        src={src} alt={alt}
        onClick={e=>e.stopPropagation()}
        style={{maxWidth:'92vw',maxHeight:'88vh',objectFit:'contain',borderRadius:10,boxShadow:'0 24px 80px rgba(0,0,0,.7)',cursor:'default',animation:'mup .2s ease'}}
      />
    </div>
  );
}

function TCard({t,submitted,onSubmit}){

    <div className={`tc ${t.priority||'low'}`}>
      {t.imageUrl&&<>
        <img
          src={t.imageUrl} alt={t.title} className="tc-img"
          onClick={()=>setLightbox(true)}
          onError={e=>e.target.style.display='none'}
          style={{cursor:'zoom-in'}}
          title="Click to view full size"
        />
        {lightbox&&<ImageLightbox src={t.imageUrl} alt={t.title} onClose={()=>setLightbox(false)}/>}
      </>}
      <div className="tct">{t.title}</div>
      <div className="tcd">{t.description}</div>
      <div className="tcm">
        <PBadge p={t.priority}/>
        <span className="badge bp">{t.domain}</span>
        {t.dueDate&&<span className="badge bgr">📅 {t.dueDate}</span>}
        {TASK_POINTS[t.title]!=null&&<span className="badge" style={{background:'#FFF3CD',color:'#7A5800',border:'1px solid #F0C040'}}>🏆 {TASK_POINTS[t.title]} pts</span>}
      </div>
      <div style={{marginTop:10}}>
        {submitted
          ?<span className="sub-done">✅ Submitted</span>

  );
}

function SHome({user,tasks,roadmaps,greet,points,submittedIds,onSubmit,allStudents}){
  const urg=tasks.filter(t=>t.priority==='urgent').length;

  /* ── helpers shared with leaderboard ── */
  const nameFrom=s=>s.name||(s.email?s.email.split('@')[0]:'Unknown');
  const initials=n=>n.split(/[\s._-]+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'??';

  /* ── leaderboard data ── */
  // Include current user even if their doc hasn't loaded yet in allStudents
  const sorted=[...allStudents]
    .sort((a,b)=>(b.points||0)-(a.points||0));
  const myPos=sorted.findIndex(s=>s.id===user.uid);

  const podConfig=[
    {cls:'p1',crown:'👑',label:'1ST',confettiColors:['#48C98A','#6EE7B7','#34D399','#10B981','#A7F3D0']},
    {cls:'p2',crown:'🥈',label:'2ND',confettiColors:['#FB923C','#FED7AA','#F97316','#EA580C','#FDE68A']},
    {cls:'p3',crown:'🥉',label:'3RD',confettiColors:['#9CA3AF','#D1D5DB','#6B7280','#E5E7EB','#F3F4F6']},
  ];

  function Confetti({colors}){
    const pieces=Array.from({length:8},(_,i)=>({
      id:i,color:colors[i%colors.length],
      left:6+i*11+'%',delay:(i*0.25)+'s',
      dur:(1.3+i%3*0.3)+'s',
      anim:['confetti-1','confetti-2','confetti-3'][i%3],
    }));
    return(
      <div className="lb-pod-confetti">
        {pieces.map(p=>(
          <div key={p.id} className="cf" style={{left:p.left,background:p.color,animation:`${p.anim} ${p.dur} ${p.delay} ease-in infinite`}}/>
        ))}
      </div>
    );
  }

  const top3=sorted.slice(0,3);
  const rest=sorted.slice(3);
  // podium order: silver left, gold center, bronze right
  const podOrder=[top3[1],top3[0],top3[2]];
  const podCfgOrder=[podConfig[1],podConfig[0],podConfig[2]];

  return(
    <div className="home-grid" style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:22,alignItems:'start'}}>

      {/* ── LEFT: main dashboard content ── */}
      <div>
        <div className="hero">
          <div className="htag">Dashboard</div>

          <div className="hs">{tasks.length} task{tasks.length!==1?'s':''} · {urg} urgent · {roadmaps.length} learning path{roadmaps.length!==1?'s':''}</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:11,marginBottom:22}}>
          <div className="pts-stat">
            <div className="sl">Total Points</div>
            <div className="sv" style={{color:'#9B6710'}}>{points}</div>
            <div className="ss">🏆 earned so far</div>
          </div>
          {(()=>{const r=getRank(points);const nr=getNextRank(points);return(
            <div className="stat" style={{background:r.bg,border:`1.5px solid ${r.border}`,boxShadow:`0 0 14px ${r.glow}`}}>
              <div className="sl" style={{color:'rgba(255,255,255,.5)'}}>Rank</div>
              <div style={{fontSize:22,fontWeight:800,color:r.color,letterSpacing:-.3}}>{r.emoji} {r.name}</div>
              <div className="ss" style={{color:'rgba(255,255,255,.4)'}}>{nr?`${nr.min-points} pts to ${nr.name}`:'Max rank!'}</div>
            </div>
          )})()}
          <div className="stat"><div className="sl">Total tasks</div><div className="sv">{tasks.length}</div><div className="ss">assigned</div></div>

/* ── Roadmap with interactive status per item ── */
function SRoadmap({roadmaps,uid}){
  const[open,setOpen]=useState({});
  // local status overrides stored in Firestore under users/{uid}/roadmapProgress/{roadmapId_phaseId_itemIdx}
  const[progress,setProgress]=useState({});
  const[saving,setSaving]=useState({});

  useEffect(()=>{
    if(!uid)return;
    const unsub=db.collection('roadmapProgress').where('uid','==',uid).onSnapshot(s=>{
      const map={};
      s.docs.forEach(d=>{map[d.id]=d.data().status});
      setProgress(map);
    });
    return()=>unsub();
  },[uid]);

  const tog=id=>setOpen(p=>({...p,[id]:!p[id]}));

  const setStatus=async(roadmapId,phaseId,itemIdx,status)=>{
    const key=`${uid}_${roadmapId}_${phaseId}_${itemIdx}`;
    setSaving(p=>({...p,[key]:true}));
    try{
      await db.collection('roadmapProgress').doc(key).set({uid,roadmapId,phaseId,itemIdx,status,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    }catch(e){console.error(e)}
    finally{setSaving(p=>({...p,[key]:false}))}
  };

  const getStatus=(roadmapId,phaseId,itemIdx)=>{
    const key=`${uid}_${roadmapId}_${phaseId}_${itemIdx}`;
    return progress[key]||'not-started';
  };

  const phaseProgress=(roadmapId,phase)=>{
    const items=phase.items||[];
    if(!items.length)return 0;
    const done=items.filter((_,i)=>getStatus(roadmapId,phase.id,i)==='done').length;
    return Math.round((done/items.length)*100);
  };

  const statusInfo={
    'not-started':{label:'Not Started',emoji:'🔜',cls:'act-ns'},
    'in-progress':{label:'In Progress',emoji:'🔄',cls:'act-ip'},
    'done':{label:'Done',emoji:'✅',cls:'act-dn'},
  };

  return(<>
    <div className="ptit">Roadmap</div>
    <div className="psub">Your step-by-step learning journey — update your status on each topic</div>
    {roadmaps.length===0?<div className="empty">No roadmaps published for your fields yet.</div>
     :roadmaps.map(r=>(
      <div key={r.id} style={{marginBottom:26}}>
        <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:16}}>{r.title}</div>
          <span className="badge bg">{r.domain}</span>
        </div>
        <div style={{fontSize:13,color:'var(--tx2)',marginBottom:12}}>{r.description}</div>
        {(r.phases||[]).map(p=>{
          const pct=phaseProgress(r.id,p);
          return(
          <div key={p.id} className="rm">
            <div className="rmh" onClick={()=>tog(p.id)}>
              <div style={{flex:1}}>
                <div className="rmht">{p.title}</div>
                <div style={{fontSize:11,color:'var(--tx3)',marginTop:1}}>{pct}% complete · {(p.items||[]).length} topic{(p.items||[]).length!==1?'s':''}</div>
              </div>
              <div className="pbar" style={{marginRight:10}}><div className="pfill" style={{width:pct+'%'}}/></div>
              <span style={{color:'var(--tx3)',fontSize:11}}>{open[p.id]?'▲':'▼'}</span>
            </div>
            {open[p.id]&&<div className="rmb">
              {(p.items||[]).map((it,i)=>{
                const st=getStatus(r.id,p.id,i);
                const key=`${uid}_${r.id}_${p.id}_${i}`;
                const isSaving=saving[key];
                return(
                <div key={i} className="ri" style={{alignItems:'center'}}>
                  <div className={`dot ${st==='done'?'done':st==='in-progress'?'active':'upcoming'}`} style={{marginTop:0,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:500}}>{it.text}</div>
                  </div>
                  <div className="status-sel" style={{opacity:isSaving?.6:1}}>
                    {['not-started','in-progress','done'].map(s=>(
                      <button key={s}
                        className={st===s?statusInfo[s].cls:''}
                        onClick={()=>!isSaving&&setStatus(r.id,p.id,i,s)}
                        title={statusInfo[s].label}>
                        {statusInfo[s].emoji} {statusInfo[s].label}
                      </button>
                    ))}
                  </div>
                </div>
              )})}
            </div>}
          </div>
        )})}
      </div>
    ))}
  </>);
}

  const[pItm,setPItm]=useState('');
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState('');
  const[fd,setFd]=useState('all');

  const addPhase=()=>{
    if(!pTit.trim()){setErr('Phase title required.');return}
    const items=pItm.split('\n').map(s=>s.trim()).filter(Boolean).map(text=>({text}));
    if(!items.length){setErr('Add at least one topic (one per line).');return}
    setErr('');
    setForm(p=>({...p,phases:[...p.phases,{id:'ph'+Date.now(),title:pTit.trim(),items}]}));

    finally{setSaving(false)}

/* ── NEW: Manual points panel (admin) ── */
function APoints({students,showNotif}){
  const[amounts,setAmounts]=useState({});
  const[reasons,setReasons]=useState({});
  const[saving,setSaving]=useState({});

  const setAmt=(id,v)=>setAmounts(p=>({...p,[id]:v}));
  const setReason=(id,v)=>setReasons(p=>({...p,[id]:v}));

  const award=async(student,isDeduct=false)=>{
    const raw=amounts[student.id];
    const pts=parseInt(raw)||0;
    if(!pts){showNotif('Enter a point amount first');return}
    const delta=isDeduct?-Math.abs(pts):Math.abs(pts);
    setSaving(p=>({...p,[student.id]:true}));
    try{
      await db.collection('users').doc(student.id).update({
        points:firebase.firestore.FieldValue.increment(delta)
      });
      // log the manual adjustment
      await db.collection('pointsLog').add({
        uid:student.id,studentName:student.name||student.email,
        delta,reason:reasons[student.id]||'Manual adjustment by admin',
        awardedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      setAmounts(p=>({...p,[student.id]:''}));
      setReasons(p=>({...p,[student.id]:''}));
      showNotif(`${isDeduct?'Deducted':'Awarded'} ${Math.abs(pts)} pts ${isDeduct?'from':'to'} ${student.name||student.email}`);
    }catch(e){showNotif('Error: '+e.message)}
    finally{setSaving(p=>({...p,[student.id]:false}))}
  };

  const sorted=[...students].sort((a,b)=>(b.points||0)-(a.points||0));

  return(<>
    <div className="ptit">Points Management</div>
    <div className="psub">Manually award or deduct points based on student performance</div>

    <div className="card" style={{marginBottom:20,background:'#FFFBEA',border:'1.5px solid #F0C040'}}>
      <div style={{fontSize:13,color:'#7A5800',lineHeight:1.6}}>
        💡 <strong>Tip:</strong> Points are also awarded automatically when students submit assignments. Use this panel to award <strong>bonus points</strong> for participation, presentations, or exceptional work — or deduct for missed deadlines.
      </div>
    </div>

    {students.length===0?<div className="empty">No students registered yet.</div>
     :sorted.map((s,rank)=>(
      <div key={s.id} className="pts-row">
        <div style={{fontSize:13,fontWeight:700,color:'var(--tx3)',width:22,textAlign:'center'}}>#{rank+1}</div>
        <Av name={s.name||s.email} size={36}/>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600}}>{s.name||'—'}</div>
          <div style={{fontSize:12,color:'var(--tx3)'}}>{s.email}</div>
          <input
            placeholder="Reason (optional)"
            value={reasons[s.id]||''}
            onChange={e=>setReason(s.id,e.target.value)}
            style={{marginTop:6,width:'100%',maxWidth:260,padding:'4px 8px',border:'1.5px solid var(--bd2)',borderRadius:6,fontSize:12,outline:'none',fontFamily:'var(--fn)'}}
          />
        </div>
        <div className="pts-val">{s.points||0}</div>
        <input
          type="number"
          className="pts-inp"
          placeholder="pts"
          min="0"
          value={amounts[s.id]||''}
          onChange={e=>setAmt(s.id,e.target.value)}
        />
        <button
          className="bs bacc"
          style={{fontSize:12,padding:'5px 10px'}}
          disabled={saving[s.id]||!amounts[s.id]}
          onClick={()=>award(s,false)}>
          {saving[s.id]?'…':'+ Award'}
        </button>
        <button
          className="bs bdg"
          style={{fontSize:12,padding:'5px 10px'}}
          disabled={saving[s.id]||!amounts[s.id]}
          onClick={()=>award(s,true)}>
          − Deduct
        </button>
      </div>
    ))}
  </>);
}

/* ═══════════════════════════════════════════════
   ROOT
═══════════════════════════════════════════════ */
function App(){
  const[screen,setScreen]=useState('loading');
  const[user,setUser]=useState(null);

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async u=>{
      if(u){
        if(u.email===ADMIN_EMAIL){setScreen('admin')}
        else{
          const snap=await db.collection('users').doc(u.uid).get();
          const d=snap.data()||{};
          setUser({uid:u.uid,displayName:u.displayName||d.name||u.email,email:u.email,fields:d.fields||[]});
          setScreen('student');
        }
      }else{setScreen('student-auth')}
    },()=>setScreen('student-auth'));
    return()=>unsub();
  },[]);

  const out=async()=>{try{await auth.signOut()}catch{}setUser(null);setScreen('student-auth')};

  if(screen==='loading')       return<Spin/>;
  if(screen==='student-auth')  return<StudentAuth onAuth={u=>{setUser(u);setScreen('student')}} onAdmin={()=>setScreen('admin-login')}/>;
  if(screen==='admin-login')   return<AdminLogin onSuccess={()=>setScreen('admin')} onBack={()=>setScreen('student-auth')}/>;
  if(screen==='admin')         return<AdminPanel onSignOut={out}/>;
  if(screen==='student')       return user?<StudentDash user={user} onSignOut={out}/>:<Spin/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
