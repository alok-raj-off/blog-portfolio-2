<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALOK — Progress Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, orderBy, query, increment }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ━━━━ 🔥 PASTE YOUR FIREBASE CONFIG HERE ━━━━ */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const VOTES_KEY = 'alok_votes_firebase_v1';
let myVotes = {};
let posts   = [];
let activeFilter = 'all';

try { myVotes = JSON.parse(localStorage.getItem(VOTES_KEY)||'{}'); } catch(e){}

/* ── LOAD POSTS ── */
async function loadPosts() {
  try {
    const snap = await getDocs(query(collection(db,'posts'), orderBy('date','desc')));
    posts = [];
    snap.forEach(d => {
      const data = d.data();
      posts.push({
        id: d.id,
        title:   data.title   || '',
        topic:   data.topic   || 'Other',
        content: data.content || '',
        date:    data.date?.toDate ? data.date.toDate().toISOString() : data.date,
        upvotes: data.upvotes || 0
      });
    });
    renderAll();
  } catch(e) {
    document.getElementById('blog-cards-container').innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Could not load posts. Check Firebase config.</div></div>';
  }
}

function renderAll() {
  computeStats();
  buildHeatmap();
  buildBranches();
  renderCards();
}

/* ── STATS ── */
function computeStats() {
  const totalUpvotes = posts.reduce((s,p) => s + (p.upvotes||0), 0);
  const activeDays   = new Set(posts.map(p => p.date?.split('T')[0])).size;
  let streak = 0;
  if (posts.length > 0) {
    const daySet = new Set(posts.map(p => p.date?.split('T')[0]));
    let d = new Date();
    while (true) {
      const k = d.toISOString().split('T')[0];
      if (daySet.has(k)) { streak++; d.setDate(d.getDate()-1); } else break;
    }
  }
  document.getElementById('stat-streak').textContent  = streak;
  document.getElementById('stat-total').textContent   = posts.length;
  document.getElementById('stat-upvotes').textContent = totalUpvotes;
  document.getElementById('stat-days').textContent    = activeDays;
}

/* ── HEATMAP ── */
function buildHeatmap() {
  const postsByDay = {};
  posts.forEach(p => {
    const k = p.date?.split('T')[0];
    if (k) postsByDay[k] = (postsByDay[k]||0)+1;
  });
  const weeks = document.getElementById('hm-weeks');
  const monthsEl = document.getElementById('hm-months');
  weeks.innerHTML = ''; monthsEl.innerHTML = '';
  const today = new Date();
  const start = new Date(today); start.setDate(start.getDate()-364);
  while (start.getDay() !== 0) start.setDate(start.getDate()-1);
  let d = new Date(start), weekCount = 0;
  const monthLabels = [], seen = new Set();
  while (d <= today) {
    const weekDiv = document.createElement('div'); weekDiv.className = 'heatmap-week';
    for (let i = 0; i < 7; i++) {
      const k = d.toISOString().split('T')[0];
      const count = postsByDay[k]||0;
      const level = d > today ? 0 : count===0?0:count===1?1:count===2?2:count===3?3:4;
      const cell = document.createElement('div');
      cell.className='heatmap-cell'; cell.setAttribute('data-level',level);
      const tip = document.createElement('div'); tip.className='cell-tooltip';
      tip.textContent = `${k} · ${count} post${count!==1?'s':''}`;
      cell.appendChild(tip);
      if (d.getDate()===1 || (weekCount===0&&i===0)) monthLabels.push({week:weekCount,label:d.toLocaleString('default',{month:'short'})});
      weekDiv.appendChild(cell);
      d.setDate(d.getDate()+1);
    }
    weeks.appendChild(weekDiv); weekCount++;
  }
  monthLabels.forEach(ml => {
    if (seen.has(ml.label)) return; seen.add(ml.label);
    const span = document.createElement('div'); span.className='month-label';
    span.style.width='52px'; span.textContent=ml.label; monthsEl.appendChild(span);
  });
}

/* ── BRANCHES ── */
function buildBranches() {
  const topicCounts = {};
  posts.forEach(p => { topicCounts[p.topic] = (topicCounts[p.topic]||0)+1; });
  const container = document.getElementById('branch-items');
  container.innerHTML = '';
  const makeItem = (filter, label, count) => {
    const item = document.createElement('div');
    item.className = 'branch-item' + (activeFilter===filter?' active':'');
    item.dataset.filter = filter;
    const lineH = Math.max(36, count*7);
    item.innerHTML = `
      ${filter!=='all'?`<div class="branch-line" style="height:${lineH}px"></div>`:''}
      <div class="branch-dot"></div>
      <div class="branch-label">${label} <span class="branch-count">${count}</span></div>`;
    item.addEventListener('click', () => { activeFilter = filter; buildBranches(); renderCards(); });
    container.appendChild(item);
  };
  makeItem('all', 'All Posts', posts.length);
  Object.keys(topicCounts).sort().forEach(t => makeItem(t, t, topicCounts[t]));
}

/* ── RENDER CARDS ── */
function renderCards() {
  const container = document.getElementById('blog-cards-container');
  const empty = document.getElementById('empty-state');
  const filtered = activeFilter==='all' ? posts : posts.filter(p=>p.topic===activeFilter);
  const sorted = [...filtered].sort((a,b) => new Date(b.date)-new Date(a.date));
  document.getElementById('active-filter-label').textContent = activeFilter==='all'?'':` · ${activeFilter}`;
  document.getElementById('post-count-label').textContent = `${sorted.length} entr${sorted.length!==1?'ies':'y'}`;
  Array.from(container.children).forEach(c => { if(c.id!=='empty-state') c.remove(); });
  if (sorted.length===0) { empty.style.display='block'; return; }
  empty.style.display='none';
  sorted.forEach(post => {
    const card = document.createElement('div'); card.className='blog-card';
    const voted = myVotes[post.id];
    const dateStr = new Date(post.date).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
    card.innerHTML=`
      <div class="card-top">
        <div class="card-meta"><div class="card-date">${dateStr}</div><div class="card-topic-tag">${post.topic}</div></div>
      </div>
      <div class="card-title">${post.title}</div>
      <div class="card-excerpt">${post.content.replace(/[#*`>]/g,'').substring(0,160)}…</div>
      <div class="card-bottom">
        <div class="card-read">Read full post →</div>
        <button class="upvote-btn ${voted?'voted':''}" data-id="${post.id}">
          <span class="upvote-icon">▲</span>
          <span class="upvote-count">${post.upvotes||0}</span>
        </button>
      </div>`;
    card.addEventListener('click', e => { if(e.target.closest('.upvote-btn'))return; openPost(post.id); });
    card.querySelector('.upvote-btn').addEventListener('click', e => { e.stopPropagation(); toggleVote(post.id, card.querySelector('.upvote-btn')); });
    container.insertBefore(card, empty);
  });
}

/* ── VOTE ── */
async function toggleVote(id, btn) {
  const post = posts.find(p=>p.id===id); if(!post)return;
  if (myVotes[id]) {
    post.upvotes = Math.max(0,(post.upvotes||0)-1);
    delete myVotes[id]; btn.classList.remove('voted');
    await updateDoc(doc(db,'posts',id), { upvotes: increment(-1) });
  } else {
    post.upvotes = (post.upvotes||0)+1;
    myVotes[id]=true; btn.classList.add('voted');
    btn.style.transform='scale(1.2)'; setTimeout(()=>btn.style.transform='',300);
    await updateDoc(doc(db,'posts',id), { upvotes: increment(1) });
  }
  btn.querySelector('.upvote-count').textContent = post.upvotes||0;
  localStorage.setItem(VOTES_KEY, JSON.stringify(myVotes));
  computeStats();
}

/* ── OPEN POST ── */
function openPost(id) {
  const post = posts.find(p=>p.id===id); if(!post)return;
  const voted = myVotes[id];
  const dateStr = new Date(post.date).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  const inner = document.getElementById('post-modal-inner');
  inner.innerHTML = `
    <div class="post-topic-chip">${post.topic}</div>
    <div class="post-modal-title">${post.title}</div>
    <div class="post-modal-meta">
      <div class="post-modal-date">${dateStr}</div>
      <div class="post-modal-date">${post.upvotes||0} upvote${(post.upvotes||0)!==1?'s':''}</div>
      <button class="post-modal-upvote ${voted?'voted':''}" id="modal-upvote-btn" data-id="${id}">
        <span>▲</span> <span id="modal-upvote-count">${post.upvotes||0}</span>
      </button>
    </div>
    <div class="post-modal-body">${parseMarkdown(post.content)}</div>
    <div class="feedback-section">
      <div class="feedback-title">Comments</div>
      <div class="feedback-list" id="fb-list-${id}"><div class="fb-loading">Loading comments…</div></div>
      <div class="feedback-form">
        <input class="fb-name-input" id="fb-name" placeholder="Your name (optional)">
        <textarea class="fb-input" id="fb-text" placeholder="Leave a comment, feedback, or encouragement…"></textarea>
        <button class="fb-submit" data-id="${id}">Post Comment</button>
      </div>
    </div>`;
  document.getElementById('post-modal').classList.add('open');
  document.body.style.overflow='hidden';

  loadComments(id);

  document.getElementById('modal-upvote-btn').addEventListener('click', function() {
    toggleVote(id, this);
    document.getElementById('modal-upvote-count').textContent = posts.find(p=>p.id===id).upvotes||0;
  });

  inner.querySelector('.fb-submit').addEventListener('click', async () => {
    const text = document.getElementById('fb-text').value.trim();
    if (!text) return;
    const author = document.getElementById('fb-name').value.trim() || 'Anonymous';
    await addDoc(collection(db,'feedback'), { postId:id, author, text, time: new Date() });
    document.getElementById('fb-text').value='';
    document.getElementById('fb-name').value='';
    loadComments(id);
  });
}

async function loadComments(postId) {
  const listEl = document.getElementById(`fb-list-${postId}`);
  if (!listEl) return;
  try {
    const snap = await getDocs(query(collection(db,'feedback'), orderBy('time','asc')));
    const comments = [];
    snap.forEach(d => { if(d.data().postId===postId) comments.push(d.data()); });
    if (comments.length===0) {
      listEl.innerHTML = '<div style="font-family:var(--serif);font-style:italic;color:rgba(245,240,232,.2);font-size:.9rem;">No comments yet. Be the first.</div>';
      return;
    }
    listEl.innerHTML = comments.map(fb=>`
      <div class="feedback-item">
        <div class="fb-author">${fb.author}</div>
        <div class="fb-text">${fb.text}</div>
        <div class="fb-time">${fb.time?.toDate ? fb.time.toDate().toLocaleString() : ''}</div>
      </div>`).join('');
  } catch(e) { listEl.innerHTML = '<div style="color:rgba(245,240,232,.2);font-size:.8rem;">Could not load comments.</div>'; }
}

function parseMarkdown(txt) {
  if (!txt) return '';
  return '<p>'+txt
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^## (.+)$/gm,'</p><h2>$1</h2><p>')
    .replace(/^### (.+)$/gm,'</p><h3>$1</h3><p>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^&gt; (.+)$/gm,'</p><blockquote>$1</blockquote><p>')
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')+'</p>';
}

document.getElementById('close-post-modal').addEventListener('click',()=>{document.getElementById('post-modal').classList.remove('open');document.body.style.overflow='';});
document.getElementById('post-modal').addEventListener('click',function(e){if(e.target===this){this.classList.remove('open');document.body.style.overflow='';}});

window.addEventListener('DOMContentLoaded', loadPosts);
</script>

.card-read{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,240,232,.25);}
.upvote-btn{display:flex;align-items:center;gap:8px;background:rgba(245,240,232,.05);border:1px solid rgba(245,240,232,.1);color:rgba(245,240,232,.4);font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;padding:8px 16px;cursor:pointer;transition:all .2s;}
.upvote-btn:hover{background:rgba(232,50,26,.1);border-color:rgba(232,50,26,.3);color:var(--red);}
.upvote-btn.voted{background:rgba(232,50,26,.15);border-color:rgba(232,50,26,.4);color:var(--red);}
.upvote-icon{font-size:1em;transition:transform .2s;}
.upvote-btn:hover .upvote-icon{transform:translateY(-2px);}
.empty-state{padding:80px 0;text-align:center;}
.empty-icon{font-size:3rem;margin-bottom:16px;opacity:.3;}
.empty-text{font-family:var(--serif);font-style:italic;font-size:1.1rem;color:rgba(245,240,232,.2);}
#post-modal{position:fixed;inset:0;z-index:9000;background:rgba(10,8,5,.96);display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;opacity:0;visibility:hidden;transition:opacity .4s,visibility .4s;padding:80px 6vw 60px;}
#post-modal.open{opacity:1;visibility:visible;}
.post-modal-inner{width:100%;max-width:760px;padding-bottom:80px;}
.post-modal-close{position:fixed;top:28px;right:40px;font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,240,232,.3);background:none;border:none;cursor:pointer;transition:color .2s;z-index:9001;}
.post-modal-close:hover{color:var(--red);}
.post-topic-chip{display:inline-block;font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;padding:5px 12px;border:1px solid rgba(232,50,26,.3);color:var(--red);margin-bottom:24px;}
.post-modal-title{font-family:var(--display);font-size:clamp(3rem,6vw,5.5rem);line-height:.9;color:var(--paper);margin-bottom:24px;}
.post-modal-meta{display:flex;align-items:center;gap:24px;margin-bottom:48px;padding-bottom:24px;border-bottom:1px solid rgba(245,240,232,.08);}
.post-modal-date{font-family:var(--mono);font-size:.65rem;letter-spacing:.15em;color:rgba(245,240,232,.25);}
.post-modal-upvote{display:flex;align-items:center;gap:8px;background:rgba(245,240,232,.05);border:1px solid rgba(245,240,232,.1);color:rgba(245,240,232,.4);font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;padding:8px 16px;cursor:pointer;transition:all .2s;margin-left:auto;}
.post-modal-upvote:hover{background:rgba(232,50,26,.1);border-color:rgba(232,50,26,.3);color:var(--red);}
.post-modal-upvote.voted{background:rgba(232,50,26,.15);border-color:rgba(232,50,26,.4);color:var(--red);}
.post-modal-body{font-family:var(--serif);font-size:1.15rem;line-height:1.85;color:rgba(245,240,232,.7);}
.post-modal-body p{margin-bottom:24px;}.post-modal-body h2{font-family:var(--display);font-size:2rem;color:var(--paper);margin:40px 0 16px;}.post-modal-body h3{font-family:var(--display);font-size:1.4rem;color:var(--paper);margin:32px 0 12px;}
.post-modal-body code{font-family:var(--mono);font-size:.85rem;background:rgba(245,240,232,.06);padding:2px 6px;color:var(--gold);}
.post-modal-body pre{background:rgba(0,0,0,.4);border:1px solid rgba(245,240,232,.08);padding:24px;margin:24px 0;overflow-x:auto;}
.post-modal-body pre code{background:none;padding:0;font-size:.8rem;color:rgba(245,240,232,.7);}
.post-modal-body blockquote{border-left:3px solid var(--red);padding-left:24px;margin:24px 0;font-style:italic;color:rgba(245,240,232,.5);}
.post-modal-body strong{color:var(--paper);}
.feedback-section{margin-top:60px;padding-top:40px;border-top:1px solid rgba(245,240,232,.08);}
.feedback-title{font-family:var(--display);font-size:2rem;color:var(--paper);margin-bottom:24px;}
.feedback-list{display:flex;flex-direction:column;gap:16px;margin-bottom:32px;}
.feedback-item{background:rgba(245,240,232,.03);border:1px solid rgba(245,240,232,.07);padding:20px 24px;}
.fb-author{font-family:var(--mono);font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--red);margin-bottom:8px;}
.fb-text{font-family:var(--serif);font-style:italic;font-size:.95rem;line-height:1.6;color:rgba(245,240,232,.5);}
.fb-time{font-family:var(--mono);font-size:.55rem;color:rgba(245,240,232,.15);margin-top:8px;}
.fb-loading{font-family:var(--mono);font-size:.65rem;color:rgba(245,240,232,.2);padding:16px 0;}
.feedback-form{display:flex;flex-direction:column;gap:12px;}
.fb-input{background:rgba(245,240,232,.04);border:1px solid rgba(245,240,232,.1);color:var(--paper);font-family:var(--serif);font-size:1rem;padding:14px 16px;outline:none;transition:border-color .2s;resize:vertical;min-height:80px;}
.fb-input:focus{border-color:rgba(232,50,26,.4);}
.fb-name-input{background:rgba(245,240,232,.04);border:1px solid rgba(245,240,232,.1);color:var(--paper);font-family:var(--mono);font-size:.8rem;padding:12px 16px;outline:none;transition:border-color .2s;}
.fb-name-input:focus{border-color:rgba(232,50,26,.4);}
.fb-submit{background:var(--red);color:#fff;font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;border:none;padding:14px 28px;cursor:pointer;transition:background .2s;align-self:flex-start;}
.fb-submit:hover{background:#c0280f;}
@media(max-width:768px){#timeline-section{grid-template-columns:1fr;}.branch-sidebar{display:none;}.posts-area{padding:40px 24px;}.streak-row{flex-wrap:wrap;}.streak-stat{min-width:50%;}}
</style>
</head>
<body>
<div id="cur"></div><div id="cur2"></div>
<div class="grain"></div>

<nav>
  <div class="nav-logo"><a href="index.html">ALOK</a></div>
  <div class="nav-center">Progress Journal</div>
  <a href="index.html" class="nav-back">← Portfolio</a>
</nav>

<div class="page-header">
  <div class="page-eyebrow">Daily Progress · Learning Journal</div>
  <h1 class="page-title">The <span>Build</span><br>Log</h1>
  <p class="page-sub">Every day I learn something. Every day I write it down. This is the proof.</p>
</div>

<div class="streak-row">
  <div class="streak-stat"><div class="s-num green" id="stat-streak">—</div><div class="s-lbl">Day Streak 🔥</div></div>
  <div class="streak-stat"><div class="s-num" id="stat-total">—</div><div class="s-lbl">Total Posts</div></div>
  <div class="streak-stat"><div class="s-num gold" id="stat-upvotes">—</div><div class="s-lbl">Total Upvotes</div></div>
  <div class="streak-stat"><div class="s-num" id="stat-days">—</div><div class="s-lbl">Days Active</div></div>
</div>

<section id="heatmap-section">
  <div class="heatmap-header">
    <div class="heatmap-title">Activity</div>
    <div class="heatmap-legend">
      <span>Less</span>
      <div class="legend-box" style="background:rgba(245,240,232,.05)"></div>
      <div class="legend-box" style="background:rgba(45,186,110,.3)"></div>
      <div class="legend-box" style="background:rgba(45,186,110,.55)"></div>
      <div class="legend-box" style="background:rgba(45,186,110,.8)"></div>
      <div class="legend-box" style="background:#2dba6e"></div>
      <span>More</span>
    </div>
  </div>
  <div class="heatmap-scroll">
    <div>
      <div class="heatmap-months" id="hm-months"></div>
      <div class="heatmap-body">
        <div class="heatmap-days-col">
          <div class="day-label">Mon</div><div class="day-label"></div>
          <div class="day-label">Wed</div><div class="day-label"></div>
          <div class="day-label">Fri</div><div class="day-label"></div>
          <div class="day-label">Sun</div>
        </div>
        <div class="heatmap-weeks" id="hm-weeks"></div>
      </div>
    </div>
  </div>
</section>

<section id="timeline-section">
  <div class="branch-sidebar">
    <div class="branch-sidebar-inner">
      <div class="branch-title">Topics</div>
      <div class="branch-line-wrap">
        <div class="branch-main-line"></div>
        <div id="branch-items"></div>
      </div>
    </div>
  </div>
  <div class="posts-area">
    <div class="posts-filter-bar">
      <div class="filter-topic">All Posts <span id="active-filter-label"></span></div>
      <div class="post-count-label" id="post-count-label">Loading…</div>
    </div>
    <div class="blog-cards" id="blog-cards-container">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">✍️</div>
        <div class="empty-text">Loading posts…</div>
      </div>
    </div>
  </div>
</section>

<!-- POST MODAL -->
<div id="post-modal">
  <button class="post-modal-close" id="close-post-modal">✕ Close</button>
  <div class="post-modal-inner" id="post-modal-inner"></div>
</div>

<script>
const cur=document.getElementById('cur'),cur2=document.getElementById('cur2');
let mx=0,my=0,rx=0,ry=0;
window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function tick(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cur2.style.left=rx+'px';cur2.style.top=ry+'px';requestAnimationFrame(tick);})();
document.querySelectorAll('button,a,.blog-card,.branch-item').forEach(el=>{el.addEventListener('mouseenter',()=>{cur.style.width='16px';cur.style.height='16px';cur2.style.width='60px';cur2.style.height='60px';cur2.style.borderColor='rgba(232,50,26,.5)';});el.addEventListener('mouseleave',()=>{cur.style.width='8px';cur.style.height='8px';cur2.style.width='50px';cur2.style.height='50px';cur2.style.borderColor='rgba(245,240,232,.3)';});});
</script>
</body>
</html>
